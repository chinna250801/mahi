<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundForge — Ultimate Sound Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Orbitron', 'sans-serif'],
                        body: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --bg: #08080f;
            --surface: #0e0e1a;
            --card: #131325;
            --card-hover: #1a1a38;
            --border: #222244;
            --text: #e8e8f5;
            --text-muted: #6a6a8e;
            --funny: #ff2d75;
            --animals: #00e676;
            --movies: #ffab00;
            --games: #00e5ff;
            --custom: #b388ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== Background Grid Pattern ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== Floating Background Orbs ===== */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--funny); top: -10%; left: -5%; animation: orbFloat1 22s ease-in-out infinite; }
        .orb-2 { width: 400px; height: 400px; background: var(--games); bottom: -10%; right: -5%; animation: orbFloat2 18s ease-in-out infinite; }
        .orb-3 { width: 350px; height: 350px; background: var(--animals); top: 50%; left: 50%; animation: orbFloat3 25s ease-in-out infinite; }
        .orb-4 { width: 300px; height: 300px; background: var(--movies); top: 20%; right: 20%; animation: orbFloat1 20s ease-in-out infinite reverse; }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.15); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }
        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-50px, -40px) scale(1.1); }
        }
        @keyframes orbFloat3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            33% { transform: translate(calc(-50% + 60px), calc(-50% - 40px)) scale(1.2); }
            66% { transform: translate(calc(-50% - 40px), calc(-50% + 50px)) scale(0.85); }
        }

        /* ===== Content Wrapper ===== */
        .content-wrap {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 100px;
        }

        /* ===== Header ===== */
        .app-header {
            text-align: center;
            padding: 30px 0 10px;
        }
        .app-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            letter-spacing: 6px;
            background: linear-gradient(135deg, var(--funny), var(--games), var(--animals));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        .app-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* ===== Category Tabs ===== */
        .cat-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 28px 0 20px;
        }
        .cat-tab {
            padding: 8px 22px;
            border-radius: 999px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            outline: none;
        }
        .cat-tab:hover {
            border-color: var(--tab-color);
            color: var(--tab-color);
            background: var(--tab-dim);
        }
        .cat-tab.active {
            border-color: var(--tab-color);
            color: var(--tab-color);
            background: var(--tab-dim);
            box-shadow: 0 0 20px var(--tab-dim), inset 0 0 20px var(--tab-dim);
        }
        .cat-tab:focus-visible {
            outline: 2px solid var(--tab-color);
            outline-offset: 2px;
        }

        /* ===== Utilities Bar ===== */
        .utils-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 10px;
        }
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 16px;
        }
        .volume-wrap i {
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.3s;
        }
        .volume-wrap:hover i { color: var(--games); }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--games);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            transition: box-shadow 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 18px rgba(0, 229, 255, 0.8);
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--games);
            border: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        .util-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 18px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
        }
        .util-btn:hover {
            border-color: var(--text-muted);
            color: var(--text);
            background: var(--card);
        }
        .util-btn.active-loop {
            border-color: var(--funny);
            color: var(--funny);
            background: rgba(255, 45, 117, 0.1);
            box-shadow: 0 0 15px rgba(255, 45, 117, 0.15);
        }
        .util-btn:focus-visible {
            outline: 2px solid var(--games);
            outline-offset: 2px;
        }

        /* ===== Sound Count ===== */
        .sound-count {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* ===== Sound Grid ===== */
        .sound-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 14px;
        }

        /* ===== Sound Button ===== */
        .sound-btn {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 28px 12px 18px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            background: var(--card);
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.3s, box-shadow 0.3s, background 0.3s;
            outline: none;
            opacity: 0;
            transform: translateY(20px);
            animation: btnEnter 0.45s ease forwards;
        }
        .sound-btn:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: var(--cat-color);
            background: var(--card-hover);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 20px var(--cat-dim);
        }
        .sound-btn:active {
            transform: scale(0.93);
            transition-duration: 0.06s;
        }
        .sound-btn:focus-visible {
            outline: 2px solid var(--cat-color);
            outline-offset: 2px;
        }

        .sound-btn.active {
            border-color: var(--cat-color);
            box-shadow: 0 0 25px var(--cat-dim), 0 0 50px var(--cat-dim), inset 0 0 30px var(--cat-dim);
            background: var(--card-hover);
        }
        .sound-btn.active .btn-icon {
            animation: iconPulse 0.4s ease-in-out infinite alternate;
        }

        @keyframes btnEnter {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes iconPulse {
            from { transform: scale(1); }
            to { transform: scale(1.18); }
        }

        .btn-icon {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: var(--cat-dim);
            color: var(--cat-color);
            font-size: 22px;
            transition: background 0.3s, transform 0.3s;
        }
        .btn-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
            text-align: center;
            line-height: 1.2;
        }
        .btn-key {
            position: absolute;
            top: 6px;
            right: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--cat-color);
            opacity: 0.5;
            background: var(--cat-dim);
            padding: 2px 6px;
            border-radius: 5px;
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: var(--cat-color);
            opacity: 0.35;
            transform: scale(0);
            animation: rippleAnim 0.55s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* Add button (custom category) */
        .add-btn {
            border-style: dashed;
            border-color: var(--custom);
            opacity: 0.6;
        }
        .add-btn:hover { opacity: 1; }
        .add-btn .btn-icon {
            background: rgba(179, 136, 255, 0.08);
            color: var(--custom);
        }

        /* ===== Visualizer ===== */
        .visualizer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            z-index: 20;
            pointer-events: none;
        }
        .visualizer-bar canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ===== Footer ===== */
        .app-footer {
            text-align: center;
            padding: 30px 0 60px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .app-footer kbd {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--text-muted);
            margin: 0 2px;
        }

        /* ===== Record Modal ===== */
        dialog {
            border: none;
            background: transparent;
            padding: 0;
            max-width: 440px;
            width: 90vw;
        }
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
        }
        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
        }
        .modal-box h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--custom);
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        .rec-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--border);
            background: var(--card);
            color: var(--text-muted);
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            outline: none;
        }
        .rec-circle:hover {
            border-color: var(--funny);
            color: var(--funny);
        }
        .rec-circle.recording {
            border-color: var(--funny);
            background: rgba(255, 45, 117, 0.15);
            color: var(--funny);
            animation: recPulse 1s ease-in-out infinite;
        }
        @keyframes recPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 45, 117, 0.3); }
            50% { box-shadow: 0 0 0 15px rgba(255, 45, 117, 0); }
        }
        .rec-status {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 20px;
            min-height: 20px;
        }
        .rec-status.error { color: var(--funny); }
        .rec-input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }
        .rec-input:focus {
            border-color: var(--custom);
        }
        .rec-input::placeholder { color: var(--text-muted); }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }
        .modal-btn {
            padding: 10px 24px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
        }
        .modal-btn:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }
        .modal-btn.save-btn {
            background: var(--custom);
            border-color: var(--custom);
            color: #0a0a12;
        }
        .modal-btn.save-btn:hover {
            background: #c49dff;
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.3);
        }
        .modal-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .preview-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
            min-height: 36px;
        }
        .preview-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }
        .preview-btn:hover { border-color: var(--games); color: var(--games); }

        /* ===== Reduced Motion ===== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .sound-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
            }
            .sound-btn { padding: 22px 8px 14px; gap: 8px; }
            .btn-icon { width: 44px; height: 44px; font-size: 18px; }
            .btn-name { font-size: 12px; }
            .content-wrap { padding: 20px 14px 90px; }
            input[type="range"] { width: 90px; }
            .utils-bar { gap: 8px; }
        }
    </style>
</head>
<body>

    <!-- Background Orbs -->
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="bg-orb orb-3" aria-hidden="true"></div>
    <div class="bg-orb orb-4" aria-hidden="true"></div>

    <!-- Main Content -->
    <div class="content-wrap">

        <!-- Header -->
        <header class="app-header">
            <h1>SOUNDFORGE</h1>
            <p>Tap &middot; Play &middot; React</p>
        </header>

        <!-- Category Tabs -->
        <nav class="cat-tabs" role="tablist" aria-label="Sound categories">
            <button class="cat-tab active" role="tab" data-cat="all" aria-selected="true">All Sounds</button>
            <button class="cat-tab" role="tab" data-cat="funny" aria-selected="false">Funny</button>
            <button class="cat-tab" role="tab" data-cat="animals" aria-selected="false">Animals</button>
            <button class="cat-tab" role="tab" data-cat="movies" aria-selected="false">Movies</button>
            <button class="cat-tab" role="tab" data-cat="games" aria-selected="false">Games</button>
            <button class="cat-tab" role="tab" data-cat="custom" aria-selected="false">Custom</button>
        </nav>

        <!-- Utilities Bar -->
        <div class="utils-bar">
            <div class="volume-wrap">
                <i class="fa-solid fa-volume-low"></i>
                <input type="range" id="volumeSlider" min="0" max="100" value="80" aria-label="Volume control">
                <i class="fa-solid fa-volume-high"></i>
            </div>
            <button class="util-btn" id="stopBtn" aria-label="Stop all sounds">
                <i class="fa-solid fa-stop"></i> Stop
            </button>
            <button class="util-btn" id="loopBtn" aria-label="Toggle loop mode">
                <i class="fa-solid fa-repeat"></i> Loop
            </button>
        </div>

        <!-- Sound Count -->
        <div class="sound-count" id="soundCount" aria-live="polite"></div>

        <!-- Sound Grid -->
        <main>
            <div class="sound-grid" id="soundGrid" role="group" aria-label="Sound buttons"></div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            Press <kbd>1</kbd>–<kbd>5</kbd> <kbd>Q</kbd>–<kbd>T</kbd> <kbd>A</kbd>–<kbd>G</kbd> for keyboard shortcuts
        </footer>
    </div>

    <!-- Visualizer Bar -->
    <div class="visualizer-bar" aria-hidden="true">
        <canvas id="visualizer"></canvas>
    </div>

    <!-- Record Modal -->
    <dialog id="recordModal">
        <div class="modal-box">
            <h2>Record Custom Sound</h2>
            <button class="rec-circle" id="recCircleBtn" aria-label="Start recording">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <div class="rec-status" id="recStatus">Click to start recording</div>
            <div class="preview-row" id="previewRow"></div>
            <input type="text" class="rec-input" id="soundNameInput" placeholder="Name your sound..." maxlength="24">
            <div class="modal-actions">
                <button class="modal-btn" id="modalCancelBtn">Cancel</button>
                <button class="modal-btn save-btn" id="modalSaveBtn" disabled>Save Sound</button>
            </div>
        </div>
    </dialog>

    <script>
        /* ==========================================================
           Audio Context & State
        ========================================================== */
        let audioCtx = null;
        let masterGain = null;
        let analyser = null;
        let activeNodes = [];
        let isLooping = false;
        let loopTimer = null;
        let lastPlayedSound = null;
        let currentCategory = 'all';
        let customSounds = [];
        let visualizerRunning = false;
        let noiseBuffer = null;

        // Cached noise buffer for reuse
        function getNoiseBuffer() {
            if (noiseBuffer) return noiseBuffer;
            const len = audioCtx.sampleRate;
            noiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
            return noiseBuffer;
        }

        // Initialize audio context on first interaction
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = document.getElementById('volumeSlider').value / 100;

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            analyser.smoothingTimeConstant = 0.75;
            masterGain.connect(analyser);
            analyser.connect(audioCtx.destination);

            if (!visualizerRunning) {
                visualizerRunning = true;
                drawVisualizer();
            }
        }

        /* ==========================================================
           Category Color Map
        ========================================================== */
        const catColors = {
            all:    { color: '#c0c0e0', dim: 'rgba(192,192,224,0.08)' },
            funny:  { color: '#ff2d75', dim: 'rgba(255,45,117,0.10)' },
            animals:{ color: '#00e676', dim: 'rgba(0,230,118,0.10)' },
            movies: { color: '#ffab00', dim: 'rgba(255,171,0,0.10)' },
            games:  { color: '#00e5ff', dim: 'rgba(0,229,255,0.10)' },
            custom: { color: '#b388ff', dim: 'rgba(179,136,255,0.10)' },
        };

        /* ==========================================================
           Keyboard Key Map
        ========================================================== */
        const keyMap = ['1','2','3','4','5','Q','W','E','R','T','A','S','D','F','G','Z','X','C','V','B'];

        /* ==========================================================
           Sound Definitions (16 synthesized sounds)
        ========================================================== */
        const soundDefs = [
            // ——— Funny ———
            {
                id: 'clap', name: 'Clap', category: 'funny', icon: 'fa-hands-clapping', duration: 0.12,
                play() {
                    const now = audioCtx.currentTime;
                    for (let i = 0; i < 3; i++) {
                        const off = i * 0.012;
                        const src = audioCtx.createBufferSource();
                        src.buffer = getNoiseBuffer();
                        const bp = audioCtx.createBiquadFilter();
                        bp.type = 'bandpass'; bp.frequency.value = 2200 + i * 300; bp.Q.value = 0.7;
                        const g = audioCtx.createGain();
                        g.gain.setValueAtTime(0.6, now + off);
                        g.gain.exponentialRampToValueAtTime(0.001, now + off + 0.07);
                        src.connect(bp).connect(g).connect(masterGain);
                        src.start(now + off, 0, 0.07);
                        src.stop(now + off + 0.08);
                        activeNodes.push(src);
                    }
                }
            },
            {

        /* ==========================================================
           DOM References
        ========================================================== */
        const grid = document.getElementById('soundGrid');
        const soundCountEl = document.getElementById('soundCount');
        const volumeSlider = document.getElementById('volumeSlider');
        const stopBtn = document.getElementById('stopBtn');
        const loopBtn = document.getElementById('loopBtn');
        const recordModal = document.getElementById('recordModal');
        const recCircleBtn = document.getElementById('recCircleBtn');
        const recStatus = document.getElementById('recStatus');
        const previewRow = document.getElementById('previewRow');
        const soundNameInput = document.getElementById('soundNameInput');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalSaveBtn = document.getElementById('modalSaveBtn');
        const catTabs = document.querySelectorAll('.cat-tab');

        /* ==========================================================
           Category Tab Setup
        ========================================================== */
        catTabs.forEach(tab => {
            const cat = tab.dataset.cat;
            const c = catColors[cat];
            tab.style.setProperty('--tab-color', c.color);
            tab.style.setProperty('--tab-dim', c.dim);
            tab.addEventListener('click', () => switchCategory(cat));
        });

        function switchCategory(cat) {
            currentCategory = cat;
            catTabs.forEach(t => {
                const isActive = t.dataset.cat === cat;
                t.classList.toggle('active', isActive);
                t.setAttribute('aria-selected', isActive);
            });
            renderGrid();
        }

        /* ==========================================================
           Render Sound Grid
        ========================================================== */
        function renderGrid() {
            grid.innerHTML = '';
            let sounds;
            if (currentCategory === 'all') {
                sounds = [...soundDefs];
            } else if (currentCategory === 'custom') {
                sounds = [...customSounds];
            } else {
                sounds = soundDefs.filter(s => s.category === currentCategory);
            }

            // Update count
            const catLabel = currentCategory === 'all' ? 'all' : currentCategory;
            soundCountEl.textContent = `Showing ${sounds.length} sound${sounds.length !== 1 ? 's' : ''}${currentCategory !== 'all' ? ' — ' + catLabel.charAt(0).toUpperCase() + catLabel.slice(1) : ''}`;

            sounds.forEach((sound, idx) => {
                const key = keyMap[idx] || '';
                const c = catColors[sound.category] || catColors.custom;
                const btn = document.createElement('button');
                btn.className = 'sound-btn';
                btn.style.setProperty('--cat-color', c.color);
                btn.style.setProperty('--cat-dim', c.dim);
                btn.style.animationDelay = `${idx * 0.04}s`;
                btn.setAttribute('aria-label', `Play ${sound.name}`);
                btn.innerHTML = `
                    ${key ? `<span class="btn-key">${key}</span>` : ''}
                    <div class="btn-icon"><i class="fa-solid ${sound.icon}"></i></div>
                    <div class="btn-name">${sound.name}</div>
                `;
                btn.addEventListener('click', (e) => playSound(sound, btn, e));
                grid.appendChild(btn);
            });

            // Add "Record New" button for custom category
            if (currentCategory === 'custom') {
                const addBtn = document.createElement('button');
                addBtn.className = 'sound-btn add-btn';
                addBtn.style.setProperty('--cat-color', catColors.custom.color);
                addBtn.style.setProperty('--cat-dim', catColors.custom.dim);
                addBtn.style.animationDelay = `${sounds.length * 0.04}s`;
                addBtn.setAttribute('aria-label', 'Record new custom sound');
                addBtn.innerHTML = `
                    <div class="btn-icon"><i class="fa-solid fa-plus"></i></div>
                    <div class="btn-name">Record New</div>
                `;
                addBtn.addEventListener('click', openRecordModal);
                grid.appendChild(addBtn);
            }
        }

        /* ==========================================================
           Play / Stop Sound
        ========================================================== */
        function playSound(sound, btn, event) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // Clear previous loop
            if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }

            // Stop current nodes
            activeNodes.forEach(n => { try { n.stop(); } catch(e) {} });
            activeNodes = [];

            // Play the sound
            sound.play();
            lastPlayedSound = sound;

            // Visual feedback
            document.querySelectorAll('.sound-btn.active').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (event) createRipple(event, btn);

            // Auto-remove active state (unless looping)
            if (!isLooping) {
                const dur = (sound.duration || 0.5) * 1000 + 150;
                setTimeout(() => btn.classList.remove('active'), dur);
            }

            // Loop mode
            if (isLooping) {
                const interval = Math.max(300, (sound.duration || 0.5) * 1000 + 100);
                loopTimer = setInterval(() => {
                    activeNodes.forEach(n => { try { n.stop(); } catch(e) {} });
                    activeNodes = [];
                    sound.play();
                }, interval);
            }
        }

        function stopAll() {
            if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
            activeNodes.forEach(n => {
                try { n.stop(); } catch(e) {}
                try { n.disconnect(); } catch(e) {}
            });
            activeNodes = [];
            lastPlayedSound = null;
            document.querySelectorAll('.sound-btn.active').forEach(b => b.classList.remove('active'));
        }

        /* ==========================================================
           Ripple Effect
        ========================================================== */
        function createRipple(event, btn) {
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        }

        /* ==========================================================
           Volume Control
        ========================================================== */
        volumeSlider.addEventListener('input', () => {
            if (masterGain) masterGain.gain.value = volumeSlider.value / 100;
        });

        /* ==========================================================
           Stop Button
        ========================================================== */
        stopBtn.addEventListener('click', stopAll);

        /* ==========================================================
           Loop Toggle
        ========================================================== */
        loopBtn.addEventListener('click', () => {
            isLooping = !isLooping;
            loopBtn.classList.toggle('active-loop', isLooping);
            if (!isLooping && loopTimer) {
                clearInterval(loopTimer);
                loopTimer = null;
            }
        });

        /* ==========================================================
           Keyboard Shortcuts
        ========================================================== */
        document.addEventListener('keydown', (e) => {
            // Don't trigger when typing in input
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (recordModal.open) return;

            const key = e.key.toUpperCase();
            const idx = keyMap.indexOf(key);
            if (idx === -1) return;

            const btns = grid.querySelectorAll('.sound-btn:not(.add-btn)');
            if (idx < btns.length) {
                e.preventDefault();
                const btn = btns[idx];
                btn.click();
            }
        });

        /* ==========================================================
           Visualizer
        ========================================================== */
        function drawVisualizer() {
            const canvas = document.getElementById('visualizer');
            const dpr = window.devicePixelRatio || 1;
            const displayW = canvas.offsetWidth;
            const displayH = canvas.offsetHeight;
            canvas.width = displayW * dpr;
            canvas.height = displayH * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const barCount = 48;
            const gap = 2;
            const barW = (displayW / barCount) - gap;

            function draw() {
                ctx.clearRect(0, 0, displayW, displayH);
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);

                for (let i = 0; i < barCount; i++) {
                    const dataIdx = Math.floor(i * data.length / barCount);
                    const val = data[dataIdx] / 255;
                    const barH = Math.max(1.5, val * displayH * 0.9);
                    const hue = (i / barCount) * 80 + 160; // cyan → magenta range
                    const alpha = 0.15 + val * 0.75;
                    ctx.fillStyle = `hsla(${hue}, 90%, 60%, ${alpha})`;
                    const x = i * (barW + gap);
                    ctx.beginPath();
                    ctx.roundRect(x, displayH - barH, barW, barH, 1);
                    ctx.fill();
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

        /* ==========================================================
           Recording Feature
        ========================================================== */
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordedBlob = null;
        let isRecording = false;
        let recStartTime = 0;
        let recTimerInterval = null;

        function openRecordModal() {
            resetRecordState();
            recordModal.showModal();
        }

        function resetRecordState() {
            recordedChunks = [];
            recordedBlob = null;
            isRecording = false;
            recStatus.textContent = 'Click to start recording';
            recStatus.className = 'rec-status';
            previewRow.innerHTML = '';
            soundNameInput.value = '';
            modalSaveBtn.disabled = true;
            recCircleBtn.classList.remove('recording');
            recCircleBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            if (recTimerInterval) clearInterval(recTimerInterval);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                try { mediaRecorder.stop(); } catch(e) {}
            }
        }

        recCircleBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // Start recording
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    recordedChunks = [];
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) recordedChunks.push(e.data);
                    };
                    mediaRecorder.onstop = () => {
                        recordedBlob = new Blob(recordedChunks, { type: 'audio/webm' });
                        stream.getTracks().forEach(t => t.stop());
                        recCircleBtn.classList.remove('recording');
                        recCircleBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                        recStatus.textContent = 'Recording saved — preview below';
                        recStatus.className = 'rec-status';
                        clearInterval(recTimerInterval);
                        // Show preview button
                        previewRow.innerHTML = '<button class="preview-btn" id="previewBtn"><i class="fa-solid fa-play"></i> Preview</button>';
                        document.getElementById('previewBtn').addEventListener('click', previewRecording);
                        modalSaveBtn.disabled = false;
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    recCircleBtn.classList.add('recording');
                    recCircleBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
                    recStatus.textContent = 'Recording...';
                    recStatus.className = 'rec-status';
                    recStartTime = Date.now();
                    recTimerInterval = setInterval(() => {
                        const elapsed = ((Date.now() - recStartTime) / 1000).toFixed(1);
                        recStatus.textContent = `Recording... ${elapsed}s`;
                    }, 100);
                } catch (err) {
                    recStatus.textContent = 'Microphone access denied';
                    recStatus.className = 'rec-status error';
                }
            } else {
                // Stop recording
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
                isRecording = false;
            }
        });

        function previewRecording() {
            if (!recordedBlob) return;
            const url = URL.createObjectURL(recordedBlob);
            const audio = new Audio(url);
            audio.play();
            audio.onended = () => URL.revokeObjectURL(url);
        }

        modalCancelBtn.addEventListener('click', () => {
            recordModal.close();
            resetRecordState();
        });

        modalSaveBtn.addEventListener('click', async () => {
            if (!recordedBlob) return;
            const name = soundNameInput.value.trim() || 'Custom ' + (customSounds.length + 1);
            try {
                initAudio();
                const arrayBuf = await recordedBlob.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
                customSounds.push({
                    id: 'custom_' + Date.now(),
                    name: name,
                    category: 'custom',
                    icon: 'fa-microphone',
                    duration: audioBuffer.duration,
                    play() {
                        const src = audioCtx.createBufferSource();
                        src.buffer = audioBuffer;
                        src.connect(masterGain);
                        src.start();
                        activeNodes.push(src);
                    }
                });
                recordModal.close();
                resetRecordState();
                if (currentCategory !== 'custom') switchCategory('custom');
                else renderGrid();
            } catch (err) {
                recStatus.textContent = 'Failed to decode audio — try again';
                recStatus.className = 'rec-status error';
            }
        });

        // Close modal on backdrop click
        recordModal.addEventListener('click', (e) => {
            if (e.target === recordModal) {
                recordModal.close();
                resetRecordState();
            }
        });

        /* ==========================================================
           Initialize
        ========================================================== */
        renderGrid();
    </script>
</body>
</html>
