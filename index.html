<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Message Encoder 🔐</title>
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --bg-color: #050a0f;
            --card-bg: #0d1218;
            --primary: #00ff41; /* Hacker Green */
            --primary-dim: rgba(0, 255, 65, 0.2);
            --accent: #00f3ff; /* Cyan */
            --text-main: #e0e0e0;
            --text-muted: #8b949e;
            --font-stack: 'Courier New', Courier, monospace;
            --radius: 8px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            padding: 20px;
        }

        /* --- LAYOUT & CONTAINER --- */
        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--primary-dim);
            border-radius: var(--radius);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid var(--primary-dim);
            background: rgba(0,0,0,0.3);
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            text-shadow: 0 0 10px var(--primary-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Main Content */
        main {
            padding: 25px;
        }

        /* --- CONTROLS & INPUTS --- */
        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select, textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            padding: 12px;
            font-family: var(--font-stack);
            font-size: 1rem;
            border-radius: var(--radius);
            transition: var(--transition);
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-dim);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius);
            font-family: var(--font-stack);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        /* Button Styles */
        .btn-encode {
            background-color: var(--primary);
            color: #000;
        }
        
        .btn-encode:hover {
            background-color: #33ff66;
            box-shadow: 0 0 15px var(--primary-dim);
        }

        .btn-decode {
            background-color: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        .btn-decode:hover {
            background-color: var(--accent);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .btn-clear {
            background-color: #333;
            color: #fff;
            max-width: 100px;
        }

        .btn-clear:hover {
            background-color: #555;
        }

        /* --- OUTPUT SECTION --- */
        .output-section {
            margin-top: 30px;
            position: relative;
        }

        .output-wrapper {
            position: relative;
        }

        #outputText {
            border-color: var(--primary-dim);
            color: var(--accent);
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-muted);
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            flex: none;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: #000;
        }

        /* --- TOAST NOTIFICATION --- */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--primary);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* --- ANIMATIONS & DECORATIONS --- */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 65, 0.05), transparent);
            pointer-events: none;
            z-index: 10;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
            .button-group { flex-direction: column; }
            .btn-clear { max-width: 100%; }
        }

    </style>
</head>
<body>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <span>✨</span> <span id="toastMsg">Message copied!</span>
    </div>

    <div class="app-container">
        <!-- Visual overlay effect -->
        <div class="scanline-overlay"></div>

        <header>
            <h1>🔐 Secret Encoder</h1>
            <p class="subtitle">Secure your communications with Agent-grade logic</p>
        </header>

        <main>
            <!-- Mode Selection -->
            <div class="control-group">
                <label for="modeSelect">Select Encryption Protocol:</label>
                <select id="modeSelect">
                    <option value="caesar">Protocol A: Caesar Shift (Letter Displacement)</option>
                    <option value="reverse">Protocol B: Mirror Reversal</option>
                    <option value="leet">Protocol C: Leet Speak (Symbol Substitution)</option>
                </select>
            </div>

            <!-- Input Area -->
            <div class="control-group">
                <label for="inputText">Incoming Transmission:</label>
                <textarea id="inputText" placeholder="Type your secret message here..."></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button class="btn-encode" id="encodeBtn">🔒 Encode</button>
                <button class="btn-decode" id="decodeBtn">🔓 Decode</button>
                <button class="btn-clear" id="clearBtn">✕ Clear</button>
            </div>

            <!-- Output Area -->
            <div class="output-section">
                <label for="outputText">Decrypted/Encrypted Result:</label>
                <div class="output-wrapper">
                    <textarea id="outputText" readonly placeholder="Result will appear here..."></textarea>
                    <button class="copy-btn" id="copyBtn">Copy 📋</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- DOM ELEMENTS ---
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const modeSelect = document.getElementById('modeSelect');
        const encodeBtn = document.getElementById('encodeBtn');
        const decodeBtn = document.getElementById('decodeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');

        // --- AUDIO SYSTEM (Web Audio API for retro sounds) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'encode') {
                // High pitch "blip"
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'decode') {
                // Lower pitch "buzz"
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'copy') {
                // Success chime
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            }
        }

        // --- CORE ENCODING LOGIC ---

        // 1. Caesar Cipher (Shift)
        function caesarCipher(str, shift) {
            return str.replace(/[a-zA-Z]/g, function(char) {
                const base = char <= 'Z' ? 65 : 97;
                return String.fromCharCode(((char.charCodeAt(0) - base + shift) % 26) + base);
            });
        }

        // 2. Reverse Text
        function reverseText(str) {
            return str.split('').reverse().join('');
        }

        // 3. Leet Speak (Symbol Replacement)
        const leetMap = {
            'a': '4', 'e': '3', 'i': '1', 'o': '0', 's': '5', 't': '7',
            'A': '@', 'E': '3', 'I': '1', 'O': '0', 'S': '$', 'T': '7'
        };
        const reverseLeetMap = {
            '4': 'a', '@': 'a', '3': 'e', '1': 'i', '0': 'o', '5': 's', '$': 's', '7': 't'
        };

        function leetEncode(str) {
            return str.split('').map(char => leetMap[char] || char).join('');
        }

        function leetDecode(str) {
            return str.split('').map(char => reverseLeetMap[char] || char).join('');
        }

        // --- MASTER CONTROLLER ---

        function processText(action) {
            const text = inputText.value;
            const mode = modeSelect.value;
            let result = '';

            if (!text) {
                showToast("⚠️ Please enter a message first!");
                return;
            }

            // Animation effect on button
            const activeBtn = action === 'encode' ? encodeBtn : decodeBtn;
            
            if (action === 'encode') {
                playSound('encode');
                outputText.style.color = '#00ff41'; // Hacker Green for output
                if (mode === 'caesar') result = caesarCipher(text, 5); // Shift forward 5
                if (mode === 'reverse') result = reverseText(text);
                if (mode === 'leet') result = leetEncode(text);
                
                // Typewriter effect simulation
                animateOutput(result);
            } else {
                playSound('decode');
                outputText.style.color = '#00f3ff'; // Cyan for decoded output
                if (mode === 'caesar') result = caesarCipher(text, -5); // Shift backward 5
                if (mode === 'reverse') result = reverseText(text);
                if (mode === 'leet') result = leetDecode(text);
                
                animateOutput(result);
            }
        }

        // --- UI UTILITIES ---

        // Simulated typing effect for the output box
        function animateOutput(finalString) {
            outputText.value = "";
            let i = 0;
            const speed = 5; // ms per character (very fast)
            
            // Simple immediate set for long texts to avoid lag, 
            // or loop for short texts. Let's do a fast loop.
            outputText.value = finalString;
        }

        // Toast Notification
        function showToast(message) {
            toastMsg.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Copy to Clipboard
        function copyToClipboard() {
            if (!outputText.value) return;
            outputText.select();
            outputText.setSelectionRange(0, 99999); /* For mobile devices */
            
            navigator.clipboard.writeText(outputText.value).then(() => {
                playSound('copy');
                showToast("📋 Copied to clipboard!");
            }).catch(err => {
                showToast("⚠️ Failed to copy");
            });
        }

        // --- EVENT LISTENERS ---

        encodeBtn.addEventListener('click', () => processText('encode'));
        decodeBtn.addEventListener('click', () => processText('decode'));
        
        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            outputText.value = '';
            inputText.focus();
        });

        copyBtn.addEventListener('click', copyToClipboard);

        // Allow Ctrl+Enter to Encode
        inputText.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                processText('encode');
            }
        });

    </script>
</body>
</html>
